<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Стекло — Аудиоплеер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0a0a1a;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  #app { position: relative; width: 100%; height: 100%; }

  /* Canvas визуализации */
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: calc(100% - 64px);
    display: block;
  }

  /* Зона загрузк */
  #drop-zone {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: calc(100% - 64px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s ease;
  }
  #drop-zone.hidden { opacity: 0; pointer-events: none; }

  #drop-area {
    border: 1px dashed rgba(255, 255, 255, 0.18);
    border-radius: 20px;
    padding: 48px 64px;
    text-align: center;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(255, 255, 255, 0.025);
    transition: all 0.25s ease;
    max-width: 90vw;
  }
  #drop-area.dragover {
    border-color: rgba(170, 200, 255, 0.55);
    background: rgba(170, 200, 255, 0.06);
    transform: scale(1.01);
  }
  #drop-area h1 {
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    color: rgba(255, 255, 255, 0.9);
  }
  #drop-area p {
    font-weight: 300;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 24px;
  }
  .btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #fff;
    padding: 11px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    transition: all 0.2s ease;
  }
  .btn:hover {
    background: rgba(255, 255, 255, 0.11);
    box-shadow: 0 0 22px rgba(170, 200, 255, 0.35);
    border-color: rgba(255, 255, 255, 0.22);
  }

  /* Панель плеера */
  #player {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 64px;
    background: rgba(18, 18, 30, 0.55);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #player.visible { opacity: 1; }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .icon-btn:hover {
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 16px rgba(170, 200, 255, 0.45);
  }
  .icon-btn svg { width: 20px; height: 20px; }
  #play-btn svg { width: 22px; height: 22px; }

  #progress-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  #time-current, #time-total {
    font-weight: 300;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.55);
    min-width: 42px;
    font-variant-numeric: tabular-nums;
  }
  #time-total { text-align: right; }

  #progress { flex: 1; min-width: 60px; }

  /* Ползунки */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    height: 20px;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 3px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
  }
  input[type=range]::-moz-range-track {
    height: 3px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
    border: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    margin-top: -4.5px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 10px rgba(170, 200, 255, 0.6);
  }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    border: none;
    box-shadow: 0 0 10px rgba(170, 200, 255, 0.6);
  }
  input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.25); }

  #volume-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 130px;
    flex-shrink: 0;
  }
  #volume { width: 85px; }

  /* Уведомление */
  #notification {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(40, 20, 30, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 120, 120, 0.35);
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 100;
  }
  #notification.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Скрытый input */
  #file-input { display: none; }

  /* Мобильная адаптация */
  @media (max-width: 640px) {
    #player { height: 84px; padding: 0 14px; gap: 10px; }
    #canvas { height: calc(100% - 84px); }
    #drop-zone { height: calc(100% - 84px); }
    #drop-area { padding: 36px 28px; }
    #drop-area h1 { font-size: 22px; }
    #drop-area p { font-size: 13px; }
    #volume-wrap { width: 90px; }
    #volume { width: 55px; }
    #time-current, #time-total { font-size: 11px; min-width: 36px; }
    .icon-btn { width: 44px; height: 44px; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>

  <!-- Зона загрузки -->
  <div id="drop-zone">
    <div id="drop-area">
      <h1>Стекло</h1>
      <p>Бросьте трек сюда</p>
      <button class="btn" id="select-btn">Выбрать файл</button>
    </div>
  </div>

  <!-- Панель плеера -->
  <div id="player">
    <button class="icon-btn" id="play-btn" title="Играть / Пауза"></button>
    <div id="progress-wrap">
      <span id="time-current">0:00</span>
      <input type="range" id="progress" min="0" max="100" step="0.1" value="0">
      <span id="time-total">0:00</span>
    </div>
    <button class="icon-btn" id="load-btn" title="Загрузить другой трек"></button>
    <div id="volume-wrap">
      <button class="icon-btn" id="volume-icon" title="Громкость"></button>
      <input type="range" id="volume" min="0" max="100" step="1" value="70">
    </div>
  </div>

  <input type="file" id="file-input" accept=".mp3,audio/mpeg,audio/wav,audio/ogg,.wav,.ogg">
  <div id="notification"></div>
</div>

<script>
/* =========================================================
   СТЕКЛО — аудиоплеер с визуализацией
   ========================================================= */

// ---------- DOM ----------
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dropZone = document.getElementById('drop-zone');
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
const selectBtn = document.getElementById('select-btn');
const player = document.getElementById('player');
const playBtn = document.getElementById('play-btn');
const progress = document.getElementById('progress');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const volume = document.getElementById('volume');
const loadBtn = document.getElementById('load-btn');
const volumeIconBtn = document.getElementById('volume-icon');
const notification = document.getElementById('notification');

// ---------- SVG-иконки ----------
const ICON = {
  play:   '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  pause:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>',
  folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>',
  volume: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.05v8.1c1.48-.73 2.5-2.25 2.5-4.05z"/></svg>'
};
playBtn.innerHTML = ICON.play;
loadBtn.innerHTML = ICON.folder;
volumeIconBtn.innerHTML = ICON.volume;

// ---------- Состояние ----------
const audio = new Audio();
audio.crossOrigin = 'anonymous';
audio.preload = 'auto';

let audioCtx = null;
let analyser = null;
let freqArray = null;
let isPlaying = false;
let trackLoaded = false;

// Сглаженные значения частот
let smoothBass = 0, smoothMid = 0, smoothHigh = 0, smoothAvg = 0;

// Объекты визуализации
let waves = [];     // Слой 2 — волны
let particles = []; // Слой 3 — частицы
let blobs = [];     // Фоновые пятна

// ---------- Уведомления ----------
let notifTimer = null;
function showNotification(msg) {
  notification.textContent = msg;
  notification.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => notification.classList.remove('show'), 3000);
}

// ---------- Canvas: размер с учётом DPR ----------
function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---------- Audio API ----------
function initAudio() {
  if (audioCtx) return;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) {
      showNotification('Браузер не поддерживает Web Audio API');
      return;
    }
    audioCtx = new Ctx();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    freqArray = new Uint8Array(analyser.frequencyBinCount);
  } catch (e) {
    console.error(e);
    showNotification('Не удалось инициализировать аудио');
  }
}

// ---------- Загрузка файла ----------
function loadFile(file) {
  if (!file) return;
  // Проверка типа/расширения
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  const okType = /^audio\/(mpeg|wav|ogg|x-wav|mp3)$/i.test(file.type);
  const okExt = ['mp3', 'wav', 'ogg'].includes(ext);
  if (!okType && !okExt) {
    showNotification('Это не аудиофайл');
    return;
  }

  initAudio();

  // Используем FileReader для чтения файла
  const reader = new FileReader();
  reader.onload = (e) => {
    audio.src = e.target.result;
    audio.load();
    trackLoaded = true;
    dropZone.classList.add('hidden');
    player.classList.add('visible');
    // Сброс волн для плавной перестройки
    waves = [];
  };
  reader.onerror = () => showNotification('Ошибка чтения файла');
  reader.readAsDataURL(file);
}

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = formatTime(audio.duration);
});
audio.addEventListener('ended', () => {
  isPlaying = false;
  playBtn.innerHTML = ICON.play;
});

// ---------- Drag & Drop ----------
['dragenter', 'dragover'].forEach(ev => {
  dropArea.addEventListener(ev, (e) => {
    e.preventDefault();
    dropArea.classList.add('dragover');
  });
});
['dragleave', 'drop'].forEach(ev => {
  dropArea.addEventListener(ev, (e) => {
    e.preventDefault();
    dropArea.classList.remove('dragover');
  });
});
dropArea.addEventListener('drop', (e) => {
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) loadFile(f);
});

// ---------- Кнопки ----------
selectBtn.addEventListener('click', () => fileInput.click());
loadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  fileInput.value = ''; // чтобы можно было загрузить тот же файл повторно
});

playBtn.addEventListener('click', () => {
  if (!trackLoaded) return;
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) {
    audio.play().then(() => {
      isPlaying = true;
      playBtn.innerHTML = ICON.pause;
    }).catch(err => {
      console.error(err);
      showNotification('Не удалось воспроизвести трек');
    });
  } else {
    audio.pause();
    isPlaying = false;
    playBtn.innerHTML = ICON.play;
  }
});

progress.addEventListener('input', () => {
  if (audio.duration) {
    audio.currentTime = (parseFloat(progress.value) / 100) * audio.duration;
  }
});
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    progress.value = (audio.currentTime / audio.duration) * 100;
    timeCurrent.textContent = formatTime(audio.currentTime);
  }
});

volume.addEventListener('input', () => {
  audio.volume = parseInt(volume.value, 10) / 100;
});
audio.volume = 0.7;

// ---------- Утилиты ----------
function formatTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
function lerp(a, b, t) { return a + (b - a) * t; }

// ---------- Инициализация объектов визуализации ----------
function initParticles() {
  particles = [];
  const count = 50;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  for (let i = 0; i < count; i++) {
    particles.push({
      baseX: Math.random() * w,
      baseY: Math.random() * h,
      size: 2 + Math.random() * 6,
      phase: Math.random() * Math.PI * 2,
      speed: 0.004 + Math.random() * 0.008,
      ampX: 30 + Math.random() * 70,
      ampY: 25 + Math.random() * 55,
      opacity: 0.25 + Math.random() * 0.45,
      flash: 0,
      hue: 190 + Math.random() * 35,
      rot: Math.random() * Math.PI
    });
  }
}

function initBlobs() {
  blobs = [
    { phase: 0,            speed: 0.00028, hue: 270, r: 320, ax: 0.28, ay: 0.25 },
    { phase: Math.PI,      speed: 0.00022, hue: 190, r: 360, ax: 0.30, ay: 0.28 },
    { phase: Math.PI / 2,  speed: 0.00032, hue: 305, r: 280, ax: 0.25, ay: 0.22 }
  ];
}

initParticles();
initBlobs();
window.addEventListener('resize', () => {
  // Перераспределяем частицы по новому размеру
  const w = canvas.clientWidth, h = canvas.clientHeight;
  particles.forEach(p => {
    p.baseX = Math.random() * w;
    p.baseY = Math.random() * h;
  });
});

// ---------- СЛОЙ 0: Фоновые пятна ----------
function drawBlobs() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  // Глубокий тёмно-синий фон
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  for (const b of blobs) {
    b.phase += b.speed;
    const cx = w * (0.5 + b.ax * Math.cos(b.phase));
    const cy = h * (0.5 + b.ay * Math.sin(b.phase * 1.3));
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, b.r);
    grad.addColorStop(0, `hsla(${b.hue}, 65%, 35%, 0.28)`);
    grad.addColorStop(0.6, `hsla(${b.hue}, 60%, 25%, 0.08)`);
    grad.addColorStop(1, `hsla(${b.hue}, 60%, 20%, 0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }
}

// ---------- СЛОЙ 1: Центральный шар (бас) ----------
// Плавный радиус (сглаживание)
let sphereR = 60;

function drawSphere(cx, cy, bass, avg) {
  // Целевой радиус 60..180
  const targetR = 60 + bass * 120;
  sphereR = lerp(sphereR, targetR, 0.12);

  // Цвет: глубокий синий (220) → фиолетовый (280) → розовый (330)
  const hue = 220 + avg * 110;

  // Внешний шар — полупрозрачный, размытая граница
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sphereR);
  grad.addColorStop(0,   `hsla(${hue + 10}, 85%, 65%, 0.60)`);
  grad.addColorStop(0.45,`hsla(${hue}, 75%, 50%, 0.35)`);
  grad.addColorStop(1,   `hsla(${hue - 10}, 70%, 40%, 0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, sphereR, 0, Math.PI * 2);
  ctx.fill();

  // Яркое ядро внутри
  const coreR = sphereR * 0.35;
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
  coreGrad.addColorStop(0, `hsla(${hue + 25}, 95%, 85%, 0.9)`);
  coreGrad.addColorStop(0.6, `hsla(${hue + 10}, 85%, 65%, 0.35)`);
  coreGrad.addColorStop(1, `hsla(${hue}, 80%, 55%, 0)`);
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
  ctx.fill();

  return hue;
}

// ---------- СЛОЙ 2: Волны (средние частоты) ----------
function updateWaves(mid) {
  // Создаём новую волну при достаточной амплитуде средних
  if (mid > 0.35 && waves.length < 7 && Math.random() < mid * 0.35) {
    waves.push({
      r: sphereR,
      opacity: 0.55 * Math.min(1, mid * 1.5),
      maxR: 300 + mid * 220,
      speed: 1.4 + mid * 2.2
    });
  }
  // Обновляем и удаляем затухшие
  for (let i = waves.length - 1; i >= 0; i--) {
    const w = waves[i];
    w.r += w.speed;
    w.opacity *= 0.985;
    if (w.r > w.maxR || w.opacity < 0.015) waves.splice(i, 1);
  }
}

function drawWaves(cx, cy, hue) {
  ctx.lineWidth = 1.3;
  for (const w of waves) {
    ctx.strokeStyle = `hsla(${hue}, 70%, 72%, ${w.opacity})`;
    ctx.beginPath();
    ctx.arc(cx, cy, w.r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ---------- СЛОЙ 3: Частицы-осколки (высокие частоты) ----------
function updateParticles(high, dt) {
  // Базовая скорость + реакция на высокие
  const speedMul = 1 + high * 3.5;
  for (const p of particles) {
    p.phase += p.speed * speedMul * dt;
    p.rot += 0.002 * dt;
    const x = p.baseX + Math.cos(p.phase) * p.ampX * (1 + high * 0.8);
    const y = p.baseY + Math.sin(p.phase * 1.3) * p.ampY * (1 + high * 0.8);
    p.x = x; p.y = y;

    // Затухание вспышки
    p.flash *= 0.88;
    // Резкие высокие — шанс вспыхнуть
    if (high > 0.45 && Math.random() < 0.04) p.flash = 1;
  }
}

function drawParticles(high) {
  for (const p of particles) {
    const alpha = p.opacity * (0.5 + high * 0.6) + p.flash * 0.55;
    const light = 70 + p.flash * 28;
    ctx.fillStyle = `hsla(${p.hue}, 55%, ${light}%, ${Math.min(1, alpha)})`;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot + p.phase * 0.3);

    // Вытянутый прямоугольник с закруглёнными углами — осколок стекла
    const w = p.size * 2;
    const h = p.size * 0.55;
    const r = Math.min(h / 2, 2);
    ctx.beginPath();
    ctx.moveTo(-w / 2 + r, -h / 2);
    ctx.lineTo( w / 2 - r, -h / 2);
    ctx.arcTo( w / 2, -h / 2,  w / 2, -h / 2 + r, r);
    ctx.lineTo( w / 2,  h / 2 - r);
    ctx.arcTo( w / 2,  h / 2,  w / 2 - r,  h / 2, r);
    ctx.lineTo(-w / 2 + r,  h / 2);
    ctx.arcTo(-w / 2,  h / 2, -w / 2,  h / 2 - r, r);
    ctx.lineTo(-w / 2, -h / 2 + r);
    ctx.arcTo(-w / 2, -h / 2, -w / 2 + r, -h / 2, r);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ---------- Анализ частот ----------
function analyze() {
  if (!analyser || !freqArray) return { bass: 0, mid: 0, high: 0, avg: 0 };
  analyser.getByteFrequencyData(freqArray);
  const len = freqArray.length;

  // Бас: бины 0..10 (~0-200 Гц)
  let bass = 0;
  for (let i = 0; i < 10; i++) bass += freqArray[i];
  bass /= (10 * 255);

  // Средние: бины 10..100
  let mid = 0;
  for (let i = 10; i < 100; i++) mid += freqArray[i];
  mid /= (90 * 255);

  // Высокие: бины 100..min(300, len)
  const highEnd = Math.min(300, len);
  let high = 0;
  for (let i = 100; i < highEnd; i++) high += freqArray[i];
  high /= ((highEnd - 100) * 255);

  // Средняя громкость
  let avg = 0;
  for (let i = 0; i < len; i++) avg += freqArray[i];
  avg /= (len * 255);

  return { bass, mid, high, avg };
}

// ---------- Главный цикл анимации ----------
let lastTime = performance.now();
function animate(now) {
  const rawDt = now - lastTime;
  lastTime = now;
  // Нормализуем dt к кадру 60 FPS (≈16.67мс), ограничиваем выбросы
  const dt = Math.min(rawDt, 50) / 16.67;

  const data = analyze();

  // Плавное сглаживание значений
  smoothBass = lerp(smoothBass, data.bass, 0.18);
  smoothMid  = lerp(smoothMid,  data.mid,  0.22);
  smoothHigh = lerp(smoothHigh, data.high, 0.28);
  smoothAvg  = lerp(smoothAvg,  data.avg,  0.12);

  // Слой 0: фон с пятнами — всегда
  drawBlobs();

  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const cx = w / 2;
  const cy = h / 2;

  // Слой 2: волны
  updateWaves(smoothMid);
  // Слой 1: шар (возвращает текущий оттенок)
  const hue = drawSphere(cx, cy, smoothBass, smoothAvg);
  drawWaves(cx, cy, hue);

  // Слой 3: частицы
  updateParticles(smoothHigh, dt);
  drawParticles(smoothHigh);

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
